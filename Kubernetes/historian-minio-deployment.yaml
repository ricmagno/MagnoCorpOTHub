# Single-replica MinIO for screenshot storage. Bucket creation ("historian-data") is a
# one-shot job, matching the docker-compose "minio-init" service.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: historian-minio
  namespace: magnocorp-othub
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian-minio
  namespace: magnocorp-othub
  labels:
    app: historian-minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: historian-minio
  template:
    metadata:
      labels:
        app: historian-minio
    spec:
      serviceAccountName: historian-minio
      automountServiceAccountToken: false
      containers:
        - name: minio
          # Digest-pinned rather than :latest (resolved from :latest at hardening time — re-resolve via
          # `docker pull minio/minio:latest && docker inspect --format='{{index .RepoDigests 0}}' minio/minio:latest`
          # when intentionally bumping). runAsNonRoot/readOnlyRootFilesystem deliberately not set here —
          # the hostPath volume below is likely created root:root by kubelet (same issue postgres's
          # initContainer works around) and MinIO's non-root behavior against it isn't verified; do
          # that as a follow-up once testable against a live cluster.
          image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: historian-minio-data
              mountPath: /data
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
        - name: historian-minio-data
          hostPath:
            path: /mnt/historian-tensor/minio
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: historian-minio
  namespace: magnocorp-othub
  labels:
    app: historian-minio
spec:
  selector:
    app: historian-minio
  ports:
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: console
      protocol: TCP
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# One-shot bucket creation, mirrors the docker-compose "minio-init" service.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: historian-minio-init
  namespace: magnocorp-othub
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: Job
metadata:
  name: historian-minio-init
  namespace: magnocorp-othub
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: historian-minio-init
    spec:
      serviceAccountName: historian-minio-init
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          # Digest-pinned rather than :latest (see historian-minio image comment above for the resolve command).
          image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          env:
            # /root is dr-xr-x--- in this image (not writable even by root without CAP_DAC_OVERRIDE,
            # which capabilities.drop:[ALL] removes) — `mc` needs $HOME writable for its config dir.
            # Confirmed live: without this, the job crash-loops on "Unable to save new mc config."
            - name: HOME
              value: /tmp
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://historian-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc mb --ignore-existing local/historian-data
