# Single-replica MinIO for screenshot storage. Bucket creation ("historian-data") is a
# one-shot job, matching the docker-compose "minio-init" service.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian-minio
  namespace: magnocorp-othub
  labels:
    app: historian-minio
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: historian-minio
  template:
    metadata:
      labels:
        app: historian-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
            - containerPort: 9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: historian-minio-data
              mountPath: /data
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      volumes:
        - name: historian-minio-data
          hostPath:
            path: /mnt/historian-tensor/minio
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: historian-minio
  namespace: magnocorp-othub
  labels:
    app: historian-minio
spec:
  selector:
    app: historian-minio
  ports:
    - name: api
      protocol: TCP
      port: 9000
      targetPort: 9000
    - name: console
      protocol: TCP
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# One-shot bucket creation, mirrors the docker-compose "minio-init" service.
apiVersion: batch/v1
kind: Job
metadata:
  name: historian-minio-init
  namespace: magnocorp-othub
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: historian-minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: historian-env
                  key: MINIO_ROOT_PASSWORD
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://historian-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done
              mc mb --ignore-existing local/historian-data
