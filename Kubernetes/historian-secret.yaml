# Fill in real values before applying, then:
#   kubectl apply -f historian-secret.yaml
# Do not commit real credentials to git — treat this checked-in copy as a template only,
# same convention as magnocorp-othub-secret.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: historian-env
  namespace: magnocorp-othub
type: Opaque
stringData:
  HISTORIAN_DATABASE_URL: "postgresql://historian:CHANGE_ME_DB_PASSWORD@historian-postgres:5432/historian_db"
  HISTORIAN_S3_ENDPOINT: "http://historian-minio:9000"
  HISTORIAN_S3_ACCESS_KEY: "CHANGE_ME_MINIO_ACCESS_KEY"
  HISTORIAN_S3_SECRET_KEY: "CHANGE_ME_MINIO_SECRET_KEY"
  HISTORIAN_S3_BUCKET: "historian-data"
  HISTORIAN_REDIS_URL: "redis://historian-redis:6379"
  POSTGRES_PASSWORD: "CHANGE_ME_DB_PASSWORD" # must match the password embedded in HISTORIAN_DATABASE_URL above
  MINIO_ROOT_USER: "CHANGE_ME_MINIO_ACCESS_KEY"
  MINIO_ROOT_PASSWORD: "CHANGE_ME_MINIO_SECRET_KEY"
