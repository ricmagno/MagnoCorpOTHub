# Embedding worker pods: each loads the ~600MB CLIP model (baked into the image at
# build time, no runtime internet egress — see Dockerfile.historian model-warmup stage).
# Concurrency 4 per worker; scale by adding replicas, not by raising HISTORIAN_WORKER_CONCURRENCY
# (embedding is CPU-bound in-process — see src/historian/workers/embedding-queue.ts).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: historian-worker
  namespace: magnocorp-othub
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian-worker
  namespace: magnocorp-othub
  labels:
    app: historian-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: historian-worker
  template:
    metadata:
      labels:
        app: historian-worker
    spec:
      serviceAccountName: historian-worker
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: ghcr-regcred
      containers:
        - name: historian-worker
          # Pinned to a real release tag rather than :latest — bump this on each release,
          # matching the convention in magnocorp-othub-deployment.yaml.
          image: ghcr.io/ricmagno/magnocorpothub-historian-worker:v1.3.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3101
          envFrom:
            - secretRef:
                name: historian-env
          env:
            - name: HISTORIAN_WORKER_CONCURRENCY
              value: "4"
            - name: HISTORIAN_WORKER_HEALTH_PORT
              value: "3101"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi # ~600MB CLIP model + working memory
            limits:
              cpu: 2000m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001 # matches `useradd -u 1001 ... historian` in Dockerfile.historian
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp # object-store.ts downloadToTemp() writes here before embedding
          readinessProbe:
            httpGet:
              path: /health
              port: 3101
            initialDelaySeconds: 15 # model load time
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3101
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: tmp
          emptyDir: {}
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
