# Automated daily backup of TEVE Postgres database to MinIO
# Runs once per day at 2 AM UTC, creating a gzipped SQL dump
# Backups are stored in MinIO bucket 'historian-backups' with a 30-day retention policy
apiVersion: v1
kind: ServiceAccount
metadata:
  name: historian-backup
  namespace: magnocorp-othub
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: historian-postgres-backup
  namespace: magnocorp-othub
spec:
  # Run daily at 02:00 UTC (off-peak, avoids ingest load)
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: historian-backup
        spec:
          serviceAccountName: historian-backup
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-bookworm
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: POSTGRES_PASSWORD
                # Real MinIO credentials from the secret (the same root creds the MinIO
                # deployment uses) — not a hardcoded "minioadmin" default, and not an
                # optional ref that silently resolves to an empty secret.
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_PASSWORD
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  BACKUP_FILE="historian-backup-$(date -u +%Y%m%d-%H%M%S).sql.gz"
                  BACKUP_SIZE_MAX_GB=10

                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Starting TEVE Postgres backup..."
                  echo "Backup file: $BACKUP_FILE"

                  # Dump the historian database, compress with gzip
                  pg_dump -h historian-postgres -U historian -d historian_db --no-password \
                    --format=plain --compress=9 --no-privileges --no-owner \
                    > /tmp/$BACKUP_FILE

                  BACKUP_SIZE=$(du -h /tmp/$BACKUP_FILE | cut -f1)
                  echo "Backup size: $BACKUP_SIZE"

                  # Verify the backup file exists and is not empty
                  if [ ! -s /tmp/$BACKUP_FILE ]; then
                    echo "ERROR: Backup file is empty!"
                    exit 1
                  fi

                  # Upload to MinIO using mc (minio client). Credentials are passed via
                  # the MC_HOST_<alias> env var (read automatically by mc) rather than as
                  # `mc alias set` arguments, so the secret never appears in the process
                  # argument list (visible via /proc or `ps`).
                  echo "Uploading to MinIO bucket..."
                  export MC_HOST_minio="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@historian-minio:9000"
                  mc mb --ignore-existing minio/historian-backups
                  mc cp /tmp/$BACKUP_FILE minio/historian-backups/

                  # Verify upload
                  REMOTE_SIZE=$(mc du minio/historian-backups/$BACKUP_FILE | awk '{print $1}')
                  echo "Uploaded successfully. Remote size: $REMOTE_SIZE"

                  # List recent backups (keep last 10 for manual reference)
                  echo "Recent backups in MinIO:"
                  mc ls minio/historian-backups/ | tail -10

                  # Clean up local file
                  rm -f /tmp/$BACKUP_FILE

                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Backup completed successfully"
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
---
# Retention policy: delete backups older than 30 days (run daily at 2:30 AM UTC)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: historian-backup-retention
  namespace: magnocorp-othub
spec:
  schedule: "30 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: historian-backup-retention
        spec:
          serviceAccountName: historian-backup
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: minio/mc:latest
              env:
                # Real MinIO credentials from the secret (see backup job above).
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_PASSWORD
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  RETENTION_DAYS=30

                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Starting backup retention cleanup..."
                  echo "Removing backups older than $RETENTION_DAYS days"

                  # Credentials via MC_HOST env (not command-line args) — see backup job.
                  export MC_HOST_minio="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@historian-minio:9000"

                  # List all backups and remove those older than retention period
                  mc find minio/historian-backups --older-than ${RETENTION_DAYS}d --exec "mc rm {}"

                  # Report remaining backups
                  REMAINING=$(mc find minio/historian-backups | wc -l)
                  echo "Retention cleanup complete. Remaining backups: $REMAINING"
                  mc ls minio/historian-backups/
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
