# Automated daily backup of TEVE Postgres database to MinIO
# Runs once per day at 2 AM UTC, creating a gzipped SQL dump
# Backups are stored in MinIO bucket 'historian-backups' with a 30-day retention policy
apiVersion: v1
kind: ServiceAccount
metadata:
  name: historian-backup
  namespace: magnocorp-othub
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: historian-postgres-backup
  namespace: magnocorp-othub
spec:
  # Run daily at 02:00 UTC (off-peak, avoids ingest load)
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: historian-backup
        spec:
          serviceAccountName: historian-backup
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          # pg_dump (postgres image) and mc (minio/mc image) live in different images, so the
          # dump runs as an initContainer that writes into a shared emptyDir, and the main
          # container uploads it. initContainers complete before the main container starts and
          # share pod volumes, so ordering and hand-off are guaranteed.
          initContainers:
            - name: dump
              image: postgres:16-bookworm
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: POSTGRES_PASSWORD
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Starting TEVE Postgres dump..."
                  # Fixed local name; the timestamped remote object name is chosen at upload time.
                  pg_dump -h historian-postgres -U historian -d historian_db --no-password \
                    --format=plain --compress=9 --no-privileges --no-owner \
                    > /backup/dump.sql.gz
                  if [ ! -s /backup/dump.sql.gz ]; then
                    echo "ERROR: dump is empty!" >&2
                    exit 1
                  fi
                  echo "Dump size: $(du -h /backup/dump.sql.gz | cut -f1)"
              volumeMounts:
                - name: backup-tmp
                  mountPath: /backup
          containers:
            - name: upload
              image: minio/mc:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                # $HOME must be writable for mc's config dir (image's /root is not writable
                # once capabilities are dropped) — same fix as the minio-init job.
                - name: HOME
                  value: /tmp
                # Real MinIO credentials from the secret (the same root creds the MinIO
                # deployment uses) — not a hardcoded "minioadmin" default, and not an
                # optional ref that silently resolves to an empty secret.
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  BACKUP_FILE="historian-backup-$(date -u +%Y%m%d-%H%M%S).sql.gz"
                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Uploading $BACKUP_FILE to MinIO..."
                  # Credentials via MC_HOST_<alias> env (read automatically by mc) rather than
                  # `mc alias set` arguments, so the secret never appears in the process argument
                  # list (visible via /proc or `ps`).
                  export MC_HOST_minio="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@historian-minio:9000"
                  mc mb --ignore-existing minio/historian-backups
                  mc cp /backup/dump.sql.gz "minio/historian-backups/${BACKUP_FILE}"
                  echo "Uploaded. Remote size: $(mc du "minio/historian-backups/${BACKUP_FILE}" | awk '{print $1}')"
                  echo "Recent backups:"
                  mc ls minio/historian-backups/ | tail -10
                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Backup completed successfully"
              volumeMounts:
                - name: backup-tmp
                  mountPath: /backup
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          volumes:
            - name: backup-tmp
              emptyDir: {}
---
# Retention policy: delete backups older than 30 days (run daily at 2:30 AM UTC)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: historian-backup-retention
  namespace: magnocorp-othub
spec:
  schedule: "30 2 * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: historian-backup-retention
        spec:
          serviceAccountName: historian-backup
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: minio/mc:latest
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              env:
                # $HOME must be writable for mc's config dir once capabilities are dropped
                # (image's /root is not writable without CAP_DAC_OVERRIDE) — same fix as
                # the minio-init job and the backup upload container.
                - name: HOME
                  value: /tmp
                # Real MinIO credentials from the secret (see backup job above).
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_USER
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: historian-env
                      key: MINIO_ROOT_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  RETENTION_DAYS=30

                  echo "[$(date -u +'%Y-%m-%d %H:%M:%S')] Starting backup retention cleanup..."
                  echo "Removing backups older than $RETENTION_DAYS days"

                  # Credentials via MC_HOST env (not command-line args) — see backup job.
                  export MC_HOST_minio="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@historian-minio:9000"

                  # List all backups and remove those older than retention period
                  mc find minio/historian-backups --older-than ${RETENTION_DAYS}d --exec "mc rm {}"

                  # Report remaining backups
                  REMAINING=$(mc find minio/historian-backups | wc -l)
                  echo "Retention cleanup complete. Remaining backups: $REMAINING"
                  mc ls minio/historian-backups/
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
