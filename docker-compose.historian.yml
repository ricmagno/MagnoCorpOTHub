services:
  postgres:
    # timescaledb-ha includes BOTH TimescaleDB and pgvector
    image: timescale/timescaledb-ha:pg16
    container_name: historian_postgres
    environment:
      POSTGRES_USER: historian
      POSTGRES_PASSWORD: historian_pwd
      POSTGRES_DB: historian_db
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/home/postgres/pgdata/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historian"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: historian_redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: historian_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # One-shot: create the bucket on startup
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/historian-data;
      "

  # API + worker as containers so TEVE runs without a dev shell and restarts on
  # reboot. HISTORIAN_ADMIN_TOKEN is interpolated from .env (gitignored) — compose
  # fails fast if it's unset rather than starting an API whose auth is disabled.
  historian-api:
    build:
      context: .
      dockerfile: Dockerfile.historian
      target: production-api
    container_name: historian_api
    environment:
      HISTORIAN_DATABASE_URL: postgresql://historian:historian_pwd@postgres:5432/historian_db
      HISTORIAN_S3_ENDPOINT: http://minio:9000
      HISTORIAN_REDIS_URL: redis://redis:6379
      HISTORIAN_ADMIN_TOKEN: ${HISTORIAN_ADMIN_TOKEN:?set HISTORIAN_ADMIN_TOKEN in .env}
    ports: ["3100:3100"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  historian-worker:
    build:
      context: .
      dockerfile: Dockerfile.historian
      target: production-worker
    container_name: historian_worker
    environment:
      HISTORIAN_DATABASE_URL: postgresql://historian:historian_pwd@postgres:5432/historian_db
      HISTORIAN_S3_ENDPOINT: http://minio:9000
      HISTORIAN_REDIS_URL: redis://redis:6379
    ports: ["3101:3101"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
